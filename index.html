<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日中戦争〜第二次世界大戦 難問モード</title>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#f7f9fc;
}

h1{
margin-top:40px;
color:#555;
}

.section{
color:#888;
margin-bottom:10px;
font-weight:bold;
}

#timer{
font-size:18px;
margin:10px;
color:#ff7b7b;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
background:#cde7ff;
transition:0.2s;
}

button:hover{
background:#a8d5ff;
}

input{
padding:8px;
font-size:16px;
width:260px;
border-radius:8px;
border:1px solid #ccc;
}

#quiz{
display:none;
margin-top:30px;
}

#result{
margin-top:20px;
font-weight:bold;
}

#final{
margin-top:30px;
}
</style>
</head>
<body>

<h1>日中戦争〜第二次世界大戦 難問モード</h1>

<button id="startBtn">スタート</button>

<div id="quiz">
<div class="section" id="section"></div>
<div id="timer"></div>
<p id="question"></p>
<input type="text" id="answerInput">
<br>
<button id="submitBtn">回答</button>
<div id="result"></div>
</div>

<div id="final"></div>

<script>

const questions = [

{section:"セクション1 日中戦争",question:"日中戦争が起こった理由となる事件は？",answers:["盧溝橋事件","ろこうきょう事件"]},
{section:"セクション1 日中戦争",question:"日本が12月に占領した土地は？",answers:["南京"]},
{section:"セクション1 日中戦争",question:"中国国民政府の代表は？",answers:["蒋介石","しょうかいせき"]},
{section:"セクション1 日中戦争",question:"中国共産党の代表は？",answers:["毛沢東","もうたくとう"]},
{section:"セクション1 日中戦争",question:"3と4の不仲を解決した人物は？",answers:["張学良","ちょうがくりょう"]},
{section:"セクション1 日中戦争",question:"共同戦線化のきっかけは？",answers:["西安事件","しーあん事件"]},
{section:"セクション1 日中戦争",question:"できた戦線は？",answers:["抗日民族統一戦線"]},
{section:"セクション1 日中戦争",question:"毛沢東と蒋介石が手を握ったことは？",answers:["第二次国共合作","第2次国共合作"]},
{section:"セクション1 日中戦争",question:"中国が拠点を移した場所は？",answers:["重慶","じゅうけい"]},

{section:"セクション2 内閣の対応",question:"『中国国民政府とは相手にしない』声明は？",answers:["第一次近衛声明","第1次近衛声明"]},
{section:"セクション2 内閣の対応",question:"戦争に国全体で参加する法律は？",answers:["国家総動員法"]},
{section:"セクション2 内閣の対応",question:"『東亜新秩序の建設』声明は？",answers:["第二次近衛声明","第2次近衛声明"]},
{section:"セクション2 内閣の対応",question:"対日和平論に傾いていた人物は？",answers:["江兆銘","こうちょうみん"]},
{section:"セクション2 内閣の対応",question:"近衛三大原則の声明は？",answers:["第三次近衛声明","第3次近衛声明"]},
{section:"セクション2 内閣の対応",question:"新国民政府を樹立させた場所は？",answers:["南京"]},

{section:"セクション3 ソ連への対応",question:"満州国境で日本が大敗した事件は？",answers:["張鼓峰事件","ちょうこほう事件"]},
{section:"セクション3 ソ連への対応",question:"蒙古国境で日本が大敗した事件は？",answers:["ノモンハン事件"]},
{section:"セクション3 ソ連への対応",question:"ドイツとソ連が結んだ条約は？",answers:["独ソ不可侵条約"]},
{section:"セクション3 ソ連への対応",question:"日本とソ連が結んだ条約は？",answers:["日ソ中立条約"]},

{section:"セクション4 WWⅡのはじまり",question:"ドイツが侵攻した国は？",answers:["ポーランド"]},
{section:"セクション4 WWⅡのはじまり",question:"宣戦布告で始まった戦争は？",answers:["第二次世界大戦","第2次世界大戦"]},
{section:"セクション4 WWⅡのはじまり",question:"日本が断ちたかったルートは？",answers:["援蒋ルート","えんしょうルート"]}

];

let current=0;
let score=0;
let timer;
let timeLeft=10;
let mistakes=[];

const startBtn=document.getElementById("startBtn");
const quiz=document.getElementById("quiz");
const sectionEl=document.getElementById("section");
const questionEl=document.getElementById("question");
const answerInput=document.getElementById("answerInput");
const resultEl=document.getElementById("result");
const timerEl=document.getElementById("timer");
const finalEl=document.getElementById("final");

startBtn.onclick=function(){
startBtn.style.display="none";
quiz.style.display="block";
loadQuestion();
};

document.getElementById("submitBtn").onclick=function(){
handleAnswer();
};

function loadQuestion(){
clearInterval(timer);
timeLeft=10;
timerEl.textContent="残り "+timeLeft+" 秒";

timer=setInterval(function(){
timeLeft--;
timerEl.textContent="残り "+timeLeft+" 秒";
if(timeLeft<=0){
clearInterval(timer);
handleAnswer(true);
}
},1000);

let q=questions[current];
sectionEl.textContent=q.section;
questionEl.textContent=q.question;
answerInput.value="";
resultEl.textContent="";
answerInput.disabled=false;
}

function handleAnswer(timeout=false){
clearInterval(timer);
answerInput.disabled=true;

let userAnswer=answerInput.value.trim();
let correctAnswers=questions[current].answers;

let correct=false;
for(let i=0;i<correctAnswers.length;i++){
if(userAnswer===correctAnswers[i]){
correct=true;
break;
}
}

if(correct){
score++;
resultEl.textContent="正解！";
}else{
resultEl.textContent="不正解… 正解は "+correctAnswers[0];
mistakes.push({
question:questions[current].question,
correct:correctAnswers[0]
});
}

current++;

setTimeout(function(){
if(current<questions.length){
loadQuestion();
}else{
showFinal();
}
},1000);
}

function showFinal(){
quiz.style.display="none";

let html="<h2>終了！</h2>";
html+="<p>スコア: "+score+" / "+questions.length+"</p>";

if(mistakes.length>0){
html+="<h3>ミスした問題</h3>";
mistakes.forEach(function(m){
html+="<p>"+m.question+"<br>→ "+m.correct+"</p>";
});
}

finalEl.innerHTML=html;
}

</script>
</body>
</html>
